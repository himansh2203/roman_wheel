<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Romantic Wheel</title>
	<style>
		:root {
			--bg-1: #ffdde1;
			--bg-2: #f9c5d1;
			--bg-3: #fcbad3;
			--accent: #ff4f81;
			--accent-dark: #d6336c;
			--card: rgba(255, 255, 255, 0.7);
			--text: #5a1d35;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			overflow: hidden;
			font-family: "Trebuchet MS", "Segoe UI", sans-serif;
			color: var(--text);
			background: radial-gradient(circle at 20% 20%, var(--bg-1), transparent 40%),
									radial-gradient(circle at 80% 10%, var(--bg-3), transparent 45%),
									radial-gradient(circle at 60% 85%, #ffd6e8, transparent 50%),
									linear-gradient(145deg, #fff5f8 0%, #ffe7ef 50%, #ffdbe8 100%);
			display: grid;
			place-items: center;
		}

		.floating-hearts {
			position: fixed;
			inset: 0;
			pointer-events: none;
			opacity: 0.35;
			background-image:
				radial-gradient(circle, #ff6b9a 8%, transparent 10%),
				radial-gradient(circle, #ff8fb3 6%, transparent 8%),
				radial-gradient(circle, #ff4f81 7%, transparent 9%);
			background-size: 120px 120px, 90px 90px, 140px 140px;
			background-position: 0 0, 40px 60px, 80px 20px;
			animation: drift 18s linear infinite;
		}

		@keyframes drift {
			from { transform: translateY(0); }
			to { transform: translateY(-120px); }
		}

		.container {
			width: min(92vw, 900px);
			text-align: center;
			z-index: 2;
		}

		h1 {
			font-size: clamp(1.8rem, 3vw, 2.8rem);
			letter-spacing: 0.06em;
			margin-bottom: 1rem;
			text-shadow: 0 3px 12px rgba(255, 111, 145, 0.35);
		}

		.wheel-wrap {
			margin: 0 auto;
			width: clamp(280px, 60vw, 520px);
			aspect-ratio: 1;
			border-radius: 50%;
			display: grid;
			place-items: center;
			padding: 12px;
			background: linear-gradient(145deg, #fff, #ffdfe9);
			box-shadow: 0 20px 45px rgba(214, 51, 108, 0.22),
									inset 0 0 0 8px rgba(255, 79, 129, 0.2);
			position: relative;
			animation: wheelGlow 4s ease-in-out infinite alternate;
		}

		@keyframes wheelGlow {
			from { box-shadow: 0 20px 45px rgba(214, 51, 108, 0.18), inset 0 0 0 8px rgba(255, 79, 129, 0.16); }
			to { box-shadow: 0 28px 58px rgba(214, 51, 108, 0.28), inset 0 0 0 8px rgba(255, 79, 129, 0.3); }
		}

		.wheel-wrap::before {
			content: "";
			position: absolute;
			inset: 10px;
			border-radius: 50%;
			border: 4px dashed rgba(255, 79, 129, 0.45);
			animation: spin 20s linear infinite;
		}

		@keyframes spin {
			from { transform: rotate(0deg); }
			to { transform: rotate(360deg); }
		}

		.wheel {
			width: 100%;
			height: 100%;
			border-radius: 50%;
			overflow: hidden;
			position: relative;
			isolation: isolate;
			background: #fff;
		}

		.slide {
			position: absolute;
			inset: 0;
			opacity: 0;
			transform: scale(1.05);
			transition: opacity 1.2s ease, transform 1.2s ease;
		}

		.slide.active {
			opacity: 1;
			transform: scale(1);
		}

		.slide img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			filter: saturate(1.15) contrast(1.04);
		}

		.caption {
			margin-top: 1.2rem;
			padding: 0.7rem 1rem;
			display: inline-block;
			border-radius: 999px;
			background: var(--card);
			backdrop-filter: blur(5px);
			border: 1px solid rgba(214, 51, 108, 0.25);
			font-weight: 700;
		}

		.modal {
			position: fixed;
			inset: 0;
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 20;
			background: rgba(255, 203, 221, 0.38);
			backdrop-filter: blur(4px);
			padding: 1rem;
		}

		.modal.show {
			display: flex;
		}

		.popup {
			width: min(90vw, 470px);
			min-height: 210px;
			background: #fff;
			border-radius: 24px;
			border: 2px solid rgba(214, 51, 108, 0.25);
			box-shadow: 0 18px 45px rgba(214, 51, 108, 0.24);
			padding: 1.4rem;
			text-align: center;
			position: relative;
		}

		.popup h2 {
			margin-top: 0.3rem;
			color: var(--accent-dark);
			font-size: clamp(1.5rem, 3vw, 2rem);
		}

		.popup p {
			margin-top: 0.55rem;
			opacity: 0.86;
			font-size: 1rem;
		}

		.buttons-zone {
			margin-top: 1.3rem;
			height: 140px;
			position: relative;
		}

		.btn {
			border: 0;
			border-radius: 999px;
			padding: 0.75rem 1.7rem;
			font-size: 1rem;
			font-weight: 700;
			cursor: pointer;
			box-shadow: 0 10px 20px rgba(90, 29, 53, 0.15);
			transition: transform 0.25s ease;
			user-select: none;
			-webkit-user-select: none;
			touch-action: manipulation;
		}

		.btn:active {
			transform: scale(0.98);
		}

		.yes-btn {
			background: linear-gradient(145deg, #ff6f91, #ff4f81);
			color: #fff;
			position: absolute;
			left: 1rem;
			top: 45%;
			transform: translateY(-50%);
		}

		.no-btn {
			background: #ffe0ea;
			color: #8e2448;
			position: absolute;
			right: 1rem;
			top: 45%;
			transform: translateY(-50%);
		}

		.love-text {
			font-size: clamp(2rem, 6vw, 3rem);
			color: var(--accent-dark);
			margin-top: 1.5rem;
			text-shadow: 0 8px 18px rgba(255, 79, 129, 0.25);
		}

		.heart-burst {
			position: absolute;
			inset: 0;
			pointer-events: none;
			overflow: hidden;
		}

		.heart {
			position: absolute;
			bottom: -20px;
			font-size: 1.2rem;
			opacity: 0;
			animation: flyUp 2.6s ease-in forwards;
		}

		@keyframes flyUp {
			0% { opacity: 0; transform: translateY(0) scale(0.8); }
			10% { opacity: 1; }
			100% { opacity: 0; transform: translateY(-220px) scale(1.4) rotate(14deg); }
		}

		.mute-note {
			margin-top: 0.9rem;
			font-size: 0.88rem;
			opacity: 0.72;
		}

	</style>
</head>
<body>
	<div class="floating-hearts" aria-hidden="true"></div>

	<main class="container">
		<h1>Our Love Wheel</h1>

		<section class="wheel-wrap" aria-label="Romantic image wheel">
			<div class="wheel" id="wheel"></div>
		</section>

		<p class="caption">This is for you JYOTI ❤️, the sweetest part of my every day.</p>
	</main>

	<section class="modal" id="dateModal" aria-modal="true" role="dialog">
		<div class="popup">
			<h2>Wanna go on a date? 💌</h2>
			<p>Soch lo... Yes button kaafi cute hai 😊</p>

			<div class="buttons-zone" id="buttonsZone">
				<button class="btn yes-btn" id="yesBtn" type="button">Yes</button>
				<button class="btn no-btn" id="noBtn" type="button">No</button>
			</div>
		</div>
	</section>

	<section class="modal" id="loveModal" aria-modal="true" role="dialog">
		<div class="popup">
			<h2 class="love-text">Love You ❤️</h2>
			<p>Yeh moment screenshot lene layak hai.</p>
			<div class="heart-burst" id="heartBurst"></div>
		</div>
	</section>

	<audio id="bgSong" src="Sadi Sun - HARSH NUSSI (mp3cut.net).mp3" loop autoplay muted preload="auto" playsinline></audio>

	<script src="script.js"></script>
</body>
</html>
